<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Форум · Web-платформа</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">Web-платформа</a>
      <nav class="site-nav">
        <a href="index.html">Главная</a>
        <a href="forum.html">Форум</a>
        <a href="news.html">Новости</a>
        <a href="chat.html">Чат</a>
        <a href="profile.html">Профиль</a>
        <a href="about.html">О нас</a>
      </nav>
    </div>
  </header>

  <main class="page page-forum">
    <section class="section-card">
      <div class="card">
        <h1>Форум</h1>
        <p>Публикуйте темы, обсуждайте с участниками и создавайте обсуждения.</p>
        <div id="forum-status" class="status-banner"></div>
        <form id="forum-form" class="form-grid">
          <label for="forum-title">Заголовок темы</label>
          <input id="forum-title" type="text" placeholder="Тема" required>
          <label for="forum-content">Содержание</label>
          <textarea id="forum-content" rows="5" placeholder="Текст темы" required></textarea>
          <label for="forum-category">Категория</label>
          <input id="forum-category" type="text" placeholder="Категория">
          <label for="forum-tags">Теги</label>
          <input id="forum-tags" type="text" placeholder="Теги через запятую">
          <button type="submit" class="btn btn-primary">Опубликовать тему</button>
        </form>
      </div>
    </section>

    <section class="section-card">
      <div class="card">
        <h2>Темы</h2>
        <div id="forum-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Web-платформа · Форум</p>
  </footer>

  <script type="module" src="scripts/forum.js"></script>
</body>
</html>
