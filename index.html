<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Форум с чатом</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Форум с чатом</h1>
  </header>

  <nav>
    <a href="#">Главная</a>
    <a href="#">Форумы</a>
    <a href="#">Правила</a>
    <a href="#">Контакты</a>
  </nav>

  <main>
    <section class="forum-section">
      <h2>Общие обсуждения</h2>
      <div class="topic-list" id="general-topics"></div>
    </section>

    <section class="forum-section">
      <h2>Чат форума</h2>
      <div class="chat-container">
        <div id="messages"></div>
        <input type="text" id="chat-input" placeholder="Напишите сообщение..." />
        <button id="send-btn">Отправить</button>
      </div>
    </section>
  </main>

  <footer>
    &copy; 2026 Форум с чатом. Все права защищены.
  </footer>

  <script src="scripts/chat.js"></script>
</body>
</html>
