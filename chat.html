<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат · Web-платформа</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">Web-платформа</a>
      <nav class="site-nav">
        <a href="index.html">Главная</a>
        <a href="forum.html">Форум</a>
        <a href="news.html">Новости</a>
        <a href="chat.html">Чат</a>
        <a href="profile.html">Профиль</a>
        <a href="about.html">О нас</a>
      </nav>
    </div>
  </header>

  <main class="page page-chat">
    <section class="section-card">
      <div class="card">
        <h1>Личный чат</h1>
        <p>Выберите собеседника и отправьте сообщение.</p>
        <div id="chat-status" class="status-banner"></div>
        <div class="inline-row">
          <label for="private-contact">Собеседник</label>
          <select id="private-contact"></select>
        </div>
        <div id="private-messages" class="messages-window"></div>
        <form id="private-form" class="chat-form">
          <input id="private-message-text" type="text" placeholder="Напишите сообщение" autocomplete="off" required>
          <button type="submit" class="btn btn-primary">Отправить</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Web-платформа · Личный чат</p>
  </footer>

  <script type="module" src="scripts/chat.js"></script>
</body>
</html>
