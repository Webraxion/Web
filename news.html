<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новости · Web-платформа</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">Web-платформа</a>
      <nav class="site-nav">
        <a href="index.html">Главная</a>
        <a href="forum.html">Форум</a>
        <a href="news.html">Новости</a>
        <a href="chat.html">Чат</a>
        <a href="profile.html">Профиль</a>
        <a href="about.html">О нас</a>
      </nav>
    </div>
  </header>

  <main class="page page-news">
    <section class="section-card">
      <div class="card">
        <h1>Новости</h1>
        <p>Публикуйте новостные объявления для пользователей.</p>
        <div id="news-status" class="status-banner"></div>
        <form id="news-form" class="form-grid">
          <label for="news-title">Заголовок новости</label>
          <input id="news-title" type="text" placeholder="Заголовок" required>
          <label for="news-body">Текст новости</label>
          <textarea id="news-body" rows="5" placeholder="Содержание" required></textarea>
          <button type="submit" class="btn btn-primary">Опубликовать новость</button>
        </form>
      </div>
    </section>

    <section class="section-card">
      <div class="card">
        <h2>Последние новости</h2>
        <div id="news-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Web-платформа · Новости</p>
  </footer>

  <script type="module" src="scripts/news.js"></script>
</body>
</html>
